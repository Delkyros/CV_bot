tipo_contratacao: "CLT"

# Filtro de tempo de publicacao da vaga (parametro f_TPR do LinkedIn).
# Valores aceitos: "24h", "semana", "mes". Deixe vazio para nao filtrar por data.
tempo_publicacao: "24h"

# geo_id e o identificador de localizacao do LinkedIn (geoId). E ele que
# restringe o pais de forma confiavel na Guest API; o texto `localizacao`
# sozinho retorna vagas dos EUA. 106057199 = Brasil. Para os filtros hibridos
# usamos o geoId do Brasil e refinamos a cidade-alvo (Sao Jose/Floripa) pelo
# texto da localizacao da vaga.
filtros_busca:
  - modelo_trabalho: "remoto"
    localizacao: "Brasil"
    geo_id: "106057199"
  - modelo_trabalho: "hibrido"
    localizacao: "São José, Santa Catarina, Brasil"
    geo_id: "106057199"
  - modelo_trabalho: "hibrido"
    localizacao: "Florianópolis, Santa Catarina, Brasil"
    geo_id: "106057199"

perfil_candidato:
  nivel_experiencia: "Pleno / Sênior"

  resumo_profissional: |
    Cientista de Dados e Engenheiro de Machine Learning / IA com Mestrado (UFSC) e sólida experiência no desenvolvimento de soluções de inteligência artificial de ponta a ponta (end-to-end). Especialista na criação de Agentes de IA autônomos baseados em LLMs, arquiteturas RAG avançadas, servidores MCP e busca vetorial voltados para a produção. Histórico comprovado no desenho de pipelines de dados escaláveis (ETL/ELT), desenvolvimento de APIs REST estruturadas e implantação de modelos em ambientes de nuvem (Azure/AWS). Combina forte base estatística e de pesquisa científica com rigorosas práticas de engenharia de software para entregar sistemas robustos e orientados a resultados de negócio.

  competencias_tecnicas:
    ia_e_llms:
      - "Agentes de IA e Sistemas Autônomos"
      - "Pipelines RAG (Retrieval-Augmented Generation)"
      - "LangChain"
      - "MCP Servers (Model Context Protocol)"
      - "Bancos Vetoriais (Qdrant)"
      - "Engenharia de Prompt e Orquestração de Ferramentas"
    machine_learning_e_nlp:
      - "Processamento de Linguagem Natural (NLP)"
      - "Deep Learning"
      - "Modelos de Classificação e Regressão (SVM, Random Forest, Naive Bayes)"
      - "Clusterização (KMeans)"
      - "Otimização de Hiperparâmetros e Validação de Modelos"
    linguagens_e_backend:
      - "Python"
      - "SQL (PostgreSQL, MySQL)"
      - "R"
      - "JavaScript"
      - "APIs RESTful"
      - "Pandas, Scikit-learn, PyTorch, Keras, SQLAlchemy"
    engenharia_de_dados_e_cloud:
      - "Pipelines ETL/ELT"
      - "Azure Data Factory"
      - "Docker e Integração Cloud-Edge"
      - "AWS (S3, EC2, RDS, Lambda)"
      - "CI/CD (GitHub Actions)"
    governanca_e_documentacao:
      - "Documentação Técnica (HLD, LLD, FSD)"
      - "Conformidade com LGPD e ISO 27001"
      - "Analytics Industrial e Conceitos de ISO 22400 (OEE)"

  soft_skills:
    - "Liderança técnica e gestão de projetos de Data Science e pesquisa aplicada."
    - "Tradução de requisitos de negócio e analíticos complexos em arquitetura de software confiável."
    - "Comunicação clara e colaboração interfuncional entre times de engenharia, negócios e ambientes industriais."
    - "Perfil autodidata com forte capacidade analítica focado na resolução de problemas complexos."
